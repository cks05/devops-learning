name: DevOps CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install flake8

      - name: Lint code
        run: flake8 .

      - name: Run script
        run: python3 app.py

      - name: Final message
        run: echo "✅ Pipeline completed successfully"
